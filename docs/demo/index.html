<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearview OD · 指挥官命令中心(演示)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f17;--panel:#131a26;--panel2:#0f1622;--line:#243040;--ink:#eef2f8;--mut:#93a0b4;--dim:#59657a;
    --green:#33c98a;--amber:#f2b53a;--red:#f2624f;--cyan:#4ac6ff;--violet:#a78bfa;--gold:#e0b354;
  }
  *{margin:0;box-sizing:border-box}
  body{font-family:'Noto Sans SC','Noto Sans JP','Inter',sans-serif;background:
    radial-gradient(1200px 600px at 85% -10%,rgba(74,155,255,.08),transparent 60%),
    radial-gradient(900px 500px at 10% 110%,rgba(224,179,84,.06),transparent 60%),var(--bg);
    color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
  .mono{font-family:'IBM Plex Mono',monospace}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 60px}

  /* top bar */
  .top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:11px}
  .baton{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#b98b2e);display:flex;align-items:center;justify-content:center;font-size:17px}
  .brand h1{font-size:16.5px;font-weight:900;letter-spacing:.2px}
  .brand .s{font-size:11.5px;color:var(--mut);margin-top:1px}
  .spacer{flex:1}
  .clock{font-size:13px;color:var(--cyan)}
  .loop{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut);background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 11px}
  .loop b{color:var(--gold);font-weight:600}
  .lang{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .lang button{background:transparent;border:0;color:var(--mut);padding:6px 12px;font-size:12.5px;cursor:pointer;font-family:inherit}
  .lang button.on{background:var(--gold);color:#1a1205;font-weight:700}

  /* kpi */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
  .kpi .l{font-size:11.5px;color:var(--mut)}
  .kpi .v{font-size:26px;font-weight:800;margin-top:5px;font-family:'Inter'}
  .kpi .d{font-size:11px;color:var(--dim);margin-top:2px}

  .sect{font-size:12px;font-weight:700;color:var(--mut);letter-spacing:1.4px;text-transform:uppercase;margin:22px 2px 12px}

  /* six domains */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;position:relative;overflow:hidden}
  .tile:before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
  .tile.high:before{background:var(--red)}.tile.med:before{background:var(--amber)}.tile.ok:before{background:var(--green)}
  .tile .h{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .tile .ico{font-size:16px}
  .tile .dm{font-size:13.5px;font-weight:700}
  .tile .sev{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
  .sev.high{background:rgba(242,98,79,.16);color:var(--red)}
  .sev.med{background:rgba(242,181,58,.16);color:var(--amber)}
  .sev.ok{background:rgba(51,201,138,.16);color:var(--green)}
  .tile .cue{font-size:13px;font-weight:600;line-height:1.45;margin-bottom:6px}
  .tile .why{font-size:11.5px;color:var(--mut);line-height:1.5;margin-bottom:9px}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
  .chip{font-size:10.5px;color:var(--cyan);background:rgba(74,198,255,.1);border:1px solid rgba(74,198,255,.22);border-radius:6px;padding:2px 7px}
  .tile .foot{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim)}
  .conf{display:flex;align-items:center;gap:6px}
  .bar{width:64px;height:5px;background:#0c121c;border-radius:4px;overflow:hidden;border:1px solid var(--line)}
  .bar i{display:block;height:100%}
  .act{margin-left:auto;font-size:11px;color:var(--gold);border:1px solid rgba(224,179,84,.35);border-radius:7px;padding:3px 9px;cursor:pointer;background:rgba(224,179,84,.06)}

  /* hero verification */
  .hero{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}
  @media(max-width:860px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.grid,.kpis{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h3{font-size:14px;font-weight:800;margin-bottom:3px}
  .card .cs{font-size:11.5px;color:var(--mut);margin-bottom:13px}
  .tl{position:relative;padding-left:20px}
  .tl:before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .step{position:relative;margin-bottom:14px}
  .step:last-child{margin-bottom:0}
  .step .dot{position:absolute;left:-18px;top:3px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg)}
  .step .st{font-size:12.5px;font-weight:700;margin-bottom:2px}
  .step .tx{font-size:11.5px;color:var(--mut);line-height:1.5}
  .verdict{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:5px}
  .v-con{background:rgba(242,98,79,.16);color:var(--red)}
  .v-ver{background:rgba(51,201,138,.16);color:var(--green)}

  .ledger{margin-top:4px}
  .lrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:12px}
  .lrow:last-child{border-bottom:0}
  .lrow .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .lrow .rs{color:var(--mut);font-size:11px;line-height:1.45}
  .lrow .cf{margin-left:auto;font-weight:700}

  /* comms */
  .comm{display:flex;gap:9px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .comm:last-child{border-bottom:0}
  .comm .av{width:26px;height:26px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--cyan);flex-shrink:0}
  .comm .who{font-size:12px;font-weight:600}
  .comm .tm{font-size:10.5px;color:var(--dim)}
  .comm .msg{font-size:12px;color:var(--mut);margin-top:2px;line-height:1.45}
  .banner{background:linear-gradient(180deg,rgba(224,179,84,.08),transparent);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:11px 14px;font-size:12px;color:var(--mut);line-height:1.6;margin-top:20px}
  .foot{color:var(--dim);font-size:11px;margin-top:16px;text-align:center;line-height:1.6}
</style>
</head>

  <div class="top">
    <div class="brand">
      <div class="baton">🎼</div>
      <div><h1 data-i="title">指挥官命令中心</h1><div class="s" data-i="sub">Clearview OD · 眼科诊所实时运营系统 · 演示(合成数据)</div></div>

        <div id="comms"></div>
      </div>
    </div>
  </div>

  <div class="banner" id="banner"></div>
  <div class="foot" id="foot"></div>
</div>

      {ico:'🧭',dm:'患者フロー',sev:'high',cue:'Room 3 の引き継ぎに競合',why:'受付は「準備完了」と主張していますが、必須の整頓スナップショットが欠落し、前の患者が6分以内に退出しています(所要時間の異常)。',chips:['連絡:準備完了','欠落:スナップ','所要時間異常'],conf:0.50,act:'検証を表示'},
      {ico:'👥',dm:'スタッフ',sev:'med',cue:'Bay 2 の事前検査が期限超過',why:'期限を過ぎても未検証で、必須文書が欠落。A · Tech への再割当てを提案します。',chips:['期限超過','欠落:文書','再割当て'],conf:0.50,act:'再割当て'},
      {ico:'📦',dm:'在庫',sev:'med',cue:'コンタクト用ソリューションが残りわずか',why:'CLS-500 の在庫は3で、発注点5を下回っています。フィッティングに支障が出る前に本日発注を提案します。',chips:['在庫 3 < 発注点 5'],conf:0.90,act:'発注書を作成'},
      {ico:'💰',dm:'財務',sev:'high',cue:'入金済み未記帳 + 請求に不備',why:'INV-3007 の自己負担 ¥8,240 は入金済みだが未記帳。請求 CLM-2041(VisionCare)は紹介状が欠落しており却下されます。',chips:['未記帳 ¥8,240','CLM-2041 紹介状なし'],conf:0.88,act:'処理する'},
      {ico:'📣',dm:'マーケティング',sev:'med',cue:'低評価の返信遅延 + 未対応リード',why:'2★ のレビュー(REV-51)は60分の応答期限を超過。Web リード LEAD-88 は24時間以上フォローされていません。',chips:['2★ 60分超過','リード 24h超'],conf:0.80,act:'返信する'},
      {ico:'🔬',dm:'機器',sev:'high',cue:'OCT #2 が校正期限切れのまま使用中',why:'OCT #2 は30日の校正期限を31日超過し、10:15 にスキャンで使用されました。オフラインにして再校正することを提案します。',chips:['31日超過','スキャンで使用中'],conf:0.85,act:'オフライン+校正'}
    ],
    timeline:[
      {c:'var(--mut)',st:'09:20 · 完了の主張',tx:'受付 A が WeCom で報告:「Room 3 は次の患者の準備ができました」。タスク claimed=ready。'},
      {c:'var(--red)',st:'クロス検証 → 競合',tx:'必須の整頓スナップショットが欠落し、前の患者が6分以内に退出(所要時間の異常)。競合がトリガーされます。',v:'con'},
      {c:'var(--cyan)',st:'技師がスナップショットをアップロード',tx:'A · Tech が「Room 3 tidied」の写真をアップロードし、必須の証拠を満たします。イベント駆動で自動再採点。'},
      {c:'var(--green)',st:'再検証 → 検証済み',tx:'スナップショットが SOP に合致し、競合が解消。タスクは検証済みとなり、信頼度は 0.855 に上昇。',v:'ver'}
    ],
    ledger:[
      {b:'競合',bc:'var(--red)',bg:'rgba(242,98,79,.16)',rs:'必須スナップショットが欠落;前の患者が6分以内に退出(所要時間の異常)。',cf:'0.50'},

      {ini:'FD',who:'A · 受付',tm:'09:20',msg:'Room 3 は次の患者の準備ができました。'},

    ]

};

var lang=safeStore.get('od_lang')||'zh';
if(!DICT[lang])lang='zh';

function confColor(c){return c>=0.8?'var(--green)':(c>=0.6?'var(--amber)':'var(--red)');}

function render(){
  var d=DICT[lang];
  document.documentElement.lang=lang;
  // static text
  document.querySelectorAll('[data-i]').forEach(function(el){var k=el.getAttribute('data-i');if(d[k]!=null)el.innerHTML=d[k];});
  // lang buttons
  document.querySelectorAll('.lang button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-l')===lang);});
  // kpis
  var kpis=[
    {l:d.kpiTempo,v:'72<span style="font-size:14px;color:var(--dim)">/100</span>',d:d.kpiTempoD,c:'var(--amber)'},
    {l:d.kpiCues,v:'6',d:d.kpiCuesD,c:'var(--ink)'},
    {l:d.kpiVer,v:'1',d:d.kpiVerD,c:'var(--green)'},
    {l:d.kpiConf,v:'0.72',d:d.kpiConfD,c:'var(--cyan)'}
  ];
  document.getElementById('kpis').innerHTML=kpis.map(function(k){
    return '<div class="kpi"><div class="l">'+k.l+'</div><div class="v" style="color:'+k.c+'">'+k.v+'</div><div class="d">'+k.d+'</div></div>';
  }).join('');
  // domains
  document.getElementById('grid').innerHTML=d.domains.map(function(x){
    var sevtxt=x.sev==='high'?d.sevHigh:(x.sev==='med'?d.sevMed:d.sevOk);
    var chips=x.chips.map(function(c){return '<span class="chip">'+c+'</span>';}).join('');
    var pct=Math.round(x.conf*100);
    return '<div class="tile '+x.sev+'">'+
      '<div class="h"><span class="ico">'+x.ico+'</span><span class="dm">'+x.dm+'</span><span class="sev '+x.sev+'">'+sevtxt+'</span></div>'+
      '<div class="cue">'+x.cue+'</div><div class="why">'+x.why+'</div>'+
      '<div class="chips">'+chips+'</div>'+
      '<div class="foot"><span class="conf">'+d.conf+' <span class="bar"><i style="width:'+pct+'%;background:'+confColor(x.conf)+'"></i></span> <b class="mono" style="color:'+confColor(x.conf)+'">'+x.conf.toFixed(2)+'</b></span>'+
      '<span class="act">'+x.act+' →</span></div></div>';
  }).join('');
  // timeline
  document.getElementById('timeline').innerHTML=d.timeline.map(function(s){
    var v=s.v?('<div class="verdict '+(s.v==='con'?'v-con':'v-ver')+'">'+(s.v==='con'?d.verdictConflict:d.verdictVerified)+'</div>'):'';
    return '<div class="step"><span class="dot" style="background:'+s.c+'"></span><div class="st">'+s.st+'</div><div class="tx">'+s.tx+'</div>'+v+'</div>';
  }).join('');
  // ledger
  document.getElementById('ledger').innerHTML=d.ledger.map(function(r){
    return '<div class="lrow"><span class="badge" style="color:'+r.bc+';background:'+r.bg+'">'+r.b+'</span><span class="rs">'+r.rs+'</span><span class="cf mono" style="color:'+r.bc+'">'+r.cf+'</span></div>';
  }).join('');
  // comms
  document.getElementById('comms').innerHTML=d.comms.map(function(c){
    return '<div class="comm"><div class="av">'+c.ini+'</div><div><span class="who">'+c.who+'</span> <span class="tm mono">'+c.tm+'</span><div class="msg">'+c.msg+'</div></div></div>';
  }).join('');
}

function setLang(l){lang=DICT[l]?l:'zh';safeStore.set('od_lang',lang);render();}

/* live clock + loop stage */
function tick(){
  var d=DICT[lang];var now=new Date();
  function p(n){return (n<10?'0':'')+n;}
  var el=document.getElementById('clock');
  if(el)el.textContent=p(now.getHours())+':'+p(now.getMinutes())+':'+p(now.getSeconds());
  var stages=d.stages||['sense'];
  var idx=Math.floor(now.getSeconds()/2)%stages.length;
  var ls=document.getElementById('loopStage');
  if(ls)ls.textContent=stages[idx];
}

try{ render(); tick(); setInterval(tick,1000); }
catch(e){ /* never leave the page blank */
  var w=document.querySelector('.wrap');
  if(w&&!document.getElementById('grid').innerHTML){ /* minimal fallback handled by render */ }
}
</script>
</body>
</html>
