# Local Postgres for development, with the pgvector extension preinstalled.
# Usage: docker compose up -d   (then `pnpm db:migrate && pnpm db:seed`)
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clearview-od-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clearview_od
    ports:
      - '5432:5432'
    volumes:
      - clearview_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d clearview_od']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clearview_pgdata:
