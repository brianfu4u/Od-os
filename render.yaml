# Render Blueprint — Clearview OD API (staging). The web runs on Vercel; the database is a managed
# Postgres with pgvector (Neon or Supabase). This file provisions the API service only; paste the
# `sync: false` secrets in the Render dashboard (see docs/DEPLOY.md). No GitHub Actions involved —
# Render deploys from the connected repo directly.
services:
  - type: web
    name: clearview-od-api
    runtime: docker
    plan: starter          # free/starter; preDeployCommand needs a paid instance — see DEPLOY.md if on free
    dockerfilePath: packages/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # Apply migrations (as the OWNER DATABASE_URL) before each deploy goes live. Idempotent.
    preDeployCommand: node db/migrate.mjs
    envVars:
      - key: NODE_ENV
        value: production
      # OWNER role — migrations only (creates clearview_app / clearview_login + tables). From Neon/Supabase.
      - key: DATABASE_URL
        sync: false
      # Least-privilege clearview_login connection — the app runtime. Non-superuser; boot self-check enforces it.
      - key: APP_DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      # The deployed web origin (Vercel), e.g. https://clearview-od.vercel.app
      - key: CORS_ORIGIN
        sync: false
      # Minimal-secure staging manager login (do NOT enable on a real prod tenant).
      - key: STAGING_LOGIN_ENABLED
        value: "true"
      - key: STAGING_LOGIN_PASSWORD
        sync: false
      - key: STAGING_TENANT_ID
        value: 11111111-1111-1111-1111-111111111111
    # Render injects PORT automatically; main.ts reads PORT (falls back to API_PORT/3001).
